<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一纸待办</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}

:root {
  --paper: #f7f4ed;
  --paper-light: #faf8f3;
  --paper-dark: #e8e2d5;
  --ink: #2c2c2c;
  --ink-light: #5a5a5a;
  --ink-muted: #999999;
  --cinnabar: #b83d2f;
  --cinnabar-light: #f5e8e6;
  --gold: #c9a961;
  --border: #e0d9cc;
  --border-light: #efe9dd;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 3px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Noto Serif SC', 'Songti SC', serif;
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 24px,
    rgba(0,0,0,0.015) 24px,
    rgba(0,0,0,0.015) 25px
  );
  pointer-events: none;
  z-index: 0;
}

.window {
  width: 100%;
  height: 100%;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.window.collapsed .tab-bar,
.window.collapsed .search-panel,
.window.collapsed .content {
  display: none;
}

.window.collapsed .title-bar {
  border-bottom: none;
  background: rgba(255,255,255,0.7);
  padding: 0 12px;
}

.window.collapsed .title-bar .drag-region {
  flex: 0 0 auto;
  padding-right: 8px;
}

.window.collapsed .title-bar .title {
  display: none;
}

.window.collapsed .collapsed-icon {
  display: flex;
}

.window.collapsed .window-controls {
  gap: 6px;
  flex: 1;
  justify-content: flex-end;
}

.window.collapsed .btn-search,
.window.collapsed .btn-pin,
.window.collapsed .btn-minimize {
  display: none;
}

.window.collapsed .window-btn {
  width: 24px;
  height: 24px;
  font-size: 12px;
}

.window.collapsed .btn-collapse {
  transform: rotate(180deg);
}

.window.collapsed {
  border-radius: var(--radius);
}

.window::after {
  content: '';
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  bottom: 12px;
  border: 1px solid rgba(184, 61, 47, 0.12);
  border-radius: var(--radius);
  pointer-events: none;
  z-index: 1;
}

.title-bar {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  background: rgba(255,255,255,0.4);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 2;
}

.window-controls {
  display: flex;
  gap: 10px;
  position: relative;
  z-index: 3;
}

.title-bar .drag-region {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 1;
}

.title-bar .title {
  font-family: 'Noto Serif SC', 'Songti SC', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--cinnabar);
  letter-spacing: 0.12em;
}

.title-bar .title::before {
  content: '◆';
  margin-right: 10px;
  color: var(--cinnabar);
  font-size: 9px;
  vertical-align: middle;
}

.collapsed-icon {
  display: none;
  font-family: 'Noto Serif SC', 'Songti SC', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--cinnabar);
  width: 26px;
  height: 26px;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(184, 61, 47, 0.25);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.55);
  pointer-events: none;
}

.window-controls {
  display: flex;
  gap: 10px;
}

.window-btn {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink-light);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.window-btn:hover {
  border-color: var(--cinnabar);
  color: var(--cinnabar);
}

.window-btn.active {
  border-color: var(--cinnabar);
  color: var(--cinnabar);
}

.tab-bar {
  display: flex;
  padding: 12px 20px 0;
  gap: 16px;
  border-bottom: 1px solid var(--border-light);
  background: rgba(255,255,255,0.3);
  position: relative;
  z-index: 2;
  justify-content: space-between;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  padding: 8px 4px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  color: var(--ink-light);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.tab:hover { color: var(--ink); }

.tab.active {
  color: var(--cinnabar);
  font-weight: 600;
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--cinnabar);
  border-radius: 1px;
}

.badge {
  font-size: 11px;
  color: var(--ink-muted);
  margin-left: 4px;
  font-weight: 400;
}

.search-panel {
  display: none;
  padding: 12px 20px;
  background: rgba(255,255,255,0.45);
  border-bottom: 1px solid var(--border-light);
  position: relative;
  z-index: 2;
}

.search-panel.show { display: block; }

.search-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.search-row:last-child { margin-bottom: 0; }

.search-input,
.search-select,
.search-date {
  box-sizing: border-box;
  height: 30px;
  min-height: 30px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(255,255,255,0.85);
  color: var(--ink);
  font-family: inherit;
  font-size: 12px;
  line-height: 1;
  outline: none;
  transition: border-color 0.2s;
  display: inline-flex;
  align-items: center;
}

.search-input:focus,
.search-select:focus,
.search-date:focus { border-color: var(--cinnabar); }

.search-input { flex: 1; min-width: 0; }
.search-select { width: 64px; cursor: pointer; }
.search-date { flex: 1; min-width: 0; }

.search-label {
  width: 32px;
  font-size: 11px;
  color: var(--ink-light);
  flex-shrink: 0;
  letter-spacing: 0.04em;
  line-height: 30px;
  align-self: center;
}

.search-sep {
  font-size: 11px;
  color: var(--ink-muted);
  flex-shrink: 0;
  line-height: 30px;
  align-self: center;
}

.search-clear {
  box-sizing: border-box;
  height: 30px;
  min-height: 30px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(255,255,255,0.8);
  color: var(--ink-light);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  line-height: 1;
}

.search-clear:hover {
  border-color: var(--cinnabar);
  color: var(--cinnabar);
  background: var(--cinnabar-light);
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px 24px;
  position: relative;
  z-index: 2;
}

.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.task-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task-item {
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.2s ease;
  cursor: pointer;
  position: relative;
}

.task-item:hover {
  background: rgba(255,255,255,0.95);
  border-color: var(--border);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

.task-item.is-adding {
  background: rgba(255,255,255,0.95);
  border-color: rgba(184, 61, 47, 0.25);
}

.task-item.completed .task-title {
  text-decoration: line-through;
  color: var(--ink-muted);
}

.checkbox {
  width: 18px;
  height: 18px;
  min-width: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  margin-top: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: transparent;
}

.checkbox:hover { border-color: var(--cinnabar); }

.checkbox.checked {
  background: var(--cinnabar);
  border-color: var(--cinnabar);
}

.checkbox svg {
  display: none;
  width: 9px;
  height: 9px;
  stroke: #fff;
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.checkbox.checked svg { display: block; }

.task-content {
  flex: 1;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}

.task-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.5;
  letter-spacing: 0.02em;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.task-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

.task-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.tag-pending { background: #f0f0f0; color: #8b8b8b; }
.tag-progress { background: #e8eef5; color: #5a7a96; }
.tag-done { background: var(--cinnabar-light); color: var(--cinnabar); }
.tag-today { background: #e8eef5; color: #5a7a96; }
.tag-planned { background: #f5f0e6; color: #a68b5b; }
.tag-anytime { background: #f0f0f0; color: #8b8b8b; }
.tag-overdue { background: var(--cinnabar-light); color: var(--cinnabar); }

.priority-high { background: var(--cinnabar-light); color: var(--cinnabar); }
.priority-medium { background: #f5f0e6; color: #a68b5b; }
.priority-low { background: #f0f0f0; color: #8b8b8b; }

.task-date {
  font-size: 12px;
  color: var(--ink-muted);
  font-family: 'SF Mono', monospace;
  letter-spacing: 0.02em;
}

.task-note {
  font-size: 12px;
  color: var(--ink-light);
  margin-top: 8px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.task-link {
  display: inline-block;
  font-size: 12px;
  color: var(--cinnabar);
  margin-top: 6px;
  text-decoration: underline;
  text-underline-offset: 2px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.task-link:hover { color: #a03528; }

.task-actions {
  display: flex;
  gap: 6px;
  opacity: 0.25;
  transition: opacity 0.2s ease;
  align-items: flex-start;
  padding-top: 2px;
}

.task-item:hover .task-actions { opacity: 1; }

.edit-btn {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(255,255,255,0.8);
  color: var(--ink-muted);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.edit-btn:hover {
  border-color: var(--cinnabar);
  color: var(--cinnabar);
  background: var(--cinnabar-light);
}

.edit-btn.delete-btn:hover {
  border-color: var(--cinnabar);
  color: #fff;
  background: var(--cinnabar);
}

.edit-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(255,255,255,0.9);
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.5;
  outline: none;
  resize: none;
  transition: border-color 0.2s;
}

.edit-input:focus { border-color: var(--cinnabar); }

.edit-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
}

.edit-actions button {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: rgba(255,255,255,0.8);
  color: var(--ink-light);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}

.edit-actions button:hover {
  border-color: var(--cinnabar);
  color: var(--cinnabar);
  background: var(--cinnabar-light);
}

.edit-actions .save-btn {
  background: var(--cinnabar);
  border-color: var(--cinnabar);
  color: #fff;
}

.edit-actions .save-btn:hover {
  background: #a03528;
  border-color: #a03528;
}

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--ink-muted);
}

.empty-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  margin-bottom: 8px;
  color: var(--ink-light);
  letter-spacing: 0.08em;
}

.empty-desc {
  font-size: 13px;
  letter-spacing: 0.04em;
}

.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(247, 244, 237, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.loading-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.loading-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.seal {
  width: 64px;
  height: 64px;
  border: 3px solid var(--cinnabar);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.5);
  position: relative;
  animation: sealStamp 1.6s ease-in-out infinite;
}

.seal::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 4px;
  right: 4px;
  bottom: 4px;
  border: 1px solid rgba(184, 61, 47, 0.3);
  border-radius: 2px;
}

.seal-text {
  font-family: 'Noto Serif SC', 'Songti SC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--cinnabar);
  letter-spacing: 0.1em;
  transform: scaleX(0.95);
}

.loading-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  animation: textPulse 1.6s ease-in-out infinite;
}

@keyframes sealStamp {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
  25% { transform: translateY(-8px) scale(1.02); opacity: 1; }
  50% { transform: translateY(2px) scale(0.98); opacity: 1; }
  75% { transform: translateY(0) scale(1); opacity: 0.9; }
}

@keyframes textPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(44, 44, 44, 0.9);
  color: #fff;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 3000;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; }

::selection {
  background: rgba(184, 61, 47, 0.15);
}

.error-banner {
  display: none;
  padding: 8px 16px;
  background: var(--cinnabar-light);
  color: var(--cinnabar);
  font-size: 13px;
  border-bottom: 1px solid var(--cinnabar);
  text-align: center;
  line-height: 1.5;
}
.error-banner.show {
  display: block;
}
</style>
</head>
<body>

<div class="window" id="window">
<div class="title-bar" id="titleBar">
  <div class="drag-region" id="dragRegion" data-tauri-drag-region>
    <span class="title">一纸待办</span>
    <span class="collapsed-icon">纸</span>
  </div>
  <div class="window-controls" id="windowControls">
    <button class="window-btn btn-add" id="btnAdd" title="添加">+</button>
    <button class="window-btn btn-refresh" id="btnRefresh" title="刷新">↻</button>
    <button class="window-btn btn-search" id="searchBtn" title="搜索">⌕</button>
    <button class="window-btn btn-pin" id="pinBtn" title="置顶/取消置顶">△</button>
    <button class="window-btn btn-collapse" id="btnCollapse" title="收起/展开">⌄</button>
    <button class="window-btn btn-minimize" id="btnMinimize" title="最小化">–</button>
    <button class="window-btn btn-close" id="btnClose" title="关闭">✕</button>
  </div>
</div>

  <div id="errorBanner" class="error-banner"></div>

  <div class="tab-bar">
    <button class="tab active" data-tab="all">
      全部 <span class="badge" id="allBadge">0</span>
    </button>
    <button class="tab" data-tab="today">
      今日 <span class="badge" id="todayBadge">0</span>
    </button>
    <button class="tab" data-tab="scheduled">
      计划 <span class="badge" id="scheduledBadge">0</span>
    </button>
    <button class="tab" data-tab="anytime">
      随时 <span class="badge" id="anytimeBadge">0</span>
    </button>
    <button class="tab" data-tab="completed">
      已批 <span class="badge" id="completedBadge">0</span>
    </button>
  </div>

  <div class="search-panel" id="searchPanel">
    <div class="search-row">
      <input type="text" class="search-input" id="searchKeyword" placeholder="搜索关键词...">
      <select class="search-select" id="searchPriority">
        <option value="">优先级</option>
        <option value="高">高</option>
        <option value="中">中</option>
        <option value="低">低</option>
      </select>
    </div>
    <div class="search-row">
      <label class="search-label">创建</label>
      <input type="date" class="search-date" id="searchCreatedFrom">
      <span class="search-sep">—</span>
      <input type="date" class="search-date" id="searchCreatedTo">
    </div>
    <div class="search-row">
      <label class="search-label">完成</label>
      <input type="date" class="search-date" id="searchCompletedFrom">
      <span class="search-sep">—</span>
      <input type="date" class="search-date" id="searchCompletedTo">
      <button class="search-clear" id="searchClear" title="清除筛选">清除</button>
    </div>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-all"><div class="task-list" id="allList"></div></div>
    <div class="tab-panel" id="panel-today"><div class="task-list" id="todayList"></div></div>
    <div class="tab-panel" id="panel-scheduled"><div class="task-list" id="scheduledList"></div></div>
    <div class="tab-panel" id="panel-anytime"><div class="task-list" id="anytimeList"></div></div>
    <div class="tab-panel" id="panel-completed"><div class="task-list" id="completedList"></div></div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="seal"><span class="seal-text">批</span></div>
    <div class="loading-text">批阅中...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tasks = [];
let currentTab = 'all';
let recognition = null;
let editingTaskId = null;
let isAdding = false;
let isAlwaysOnTop = false;
let searchVisible = false;
let isCollapsed = false;

const STATUS_MAP = {
  '待办': { label: '待办', class: 'tag-pending', code: 'pending' },
  '进行中': { label: '进行中', class: 'tag-progress', code: 'progress' },
  '已完成': { label: '已批', class: 'tag-done', code: 'done' }
};

async function invoke(cmd, args = {}) {
  console.log('invoke: ' + cmd);
  try {
    if (!window.__TAURI__) {
      throw new Error('window.__TAURI__ is undefined');
    }
    if (!window.__TAURI__.core) {
      throw new Error('window.__TAURI__.core is undefined');
    }
    return await window.__TAURI__.core.invoke(cmd, args);
  } catch (error) {
    console.log('invoke error ' + cmd + ': ' + error.message);
    showToast('调用失败: ' + error.message);
    throw error;
  }
}

function initVoice() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => showToast('正在聆听...');
    recognition.onend = () => {};
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      if (transcript.toLowerCase().includes('todolist')) {
        const taskText = transcript.replace(/todolist/i, '').trim();
        if (taskText) addTask(taskText);
      } else {
        showToast('请说 "TODOList" 开头');
      }
    };
    recognition.onerror = () => showToast('语音识别失败');
  }
}

function extractDeadline(text) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  if (text.includes('今天')) return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')} 00:00:00`;
  if (text.includes('明天')) {
    const t = new Date(now); t.setDate(t.getDate() + 1);
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')} 00:00:00`;
  }
  if (text.includes('后天')) {
    const t = new Date(now); t.setDate(t.getDate() + 2);
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')} 00:00:00`;
  }
  if (text.includes('下周')) {
    const t = new Date(now); t.setDate(t.getDate() + 7);
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')} 00:00:00`;
  }
  if (text.includes('下月') || text.includes('下个月')) {
    const t = new Date(now); t.setMonth(t.getMonth() + 1);
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')} 00:00:00`;
  }
  return null;
}

function cleanTaskName(text) {
  return text.replace(/(今天|明天|后天|下周|下月|下个月)\s*/g, '').trim();
}

function showError(message) {
  const el = document.getElementById('errorBanner');
  if (el) {
    el.textContent = message;
    el.classList.add('show');
  }
}

function hideError() {
  const el = document.getElementById('errorBanner');
  if (el) el.classList.remove('show');
}

async function loadTasks(opts = {}) {
  if (!opts.silent) showLoading();
  hideError();
  try {
    const data = await invoke('get_tasks');
    if (data.code === 0 && data.data) {
      tasks = data.data;
      console.log('loaded ' + tasks.length + ' tasks');
    } else {
      tasks = [];
      const msg = data.msg || 'unknown';
      console.log('load failed: ' + msg);
      showError('同步失败：' + msg);
    }
    renderTasks();
  } catch (error) {
    console.error('Load error:', error);
    showError('无法连接到后端：' + (error.message || error));
  } finally {
    if (!opts.silent) hideLoading();
  }
}

async function addTask(name, priority = '中', deadline = null) {
  const autoDeadline = extractDeadline(name);
  const cleanName = cleanTaskName(name);
  const finalDeadline = deadline ? `${deadline} 00:00:00` : autoDeadline;
  showLoading();
  try {
    const data = await invoke('create_task', { name: cleanName, deadline: finalDeadline, priority });
    if (data.code === 0) {
      isAdding = false;
      showToast('已添加');
      // Optimistic update: show the new task immediately before slow refresh
      const now = new Date().toISOString();
      const tempTask = {
        id: 'temp-' + Date.now(),
        name: cleanName,
        status: '待办',
        deadline: finalDeadline,
        priority: priority,
        note: '',
        link: '',
        created_at: now,
        completed_at: null,
        task_type: finalDeadline ? 'scheduled' : 'someday'
      };
      tasks.unshift(tempTask);
      renderTasks();
      hideLoading();
      // Refresh in background to get real record id
      await loadTasks({ silent: true });
    } else {
      showToast(data.msg || '添加失败');
      showError('添加失败：' + (data.msg || '未知错误'));
    }
  } catch (error) {
    showToast('添加失败');
    showError('添加失败：' + (error.message || error));
  } finally {
    hideLoading();
  }
}

async function updateTask(id, name, priority, deadline, link, note) {
  showLoading();
  try {
    const payload = { 'id': id, '任务名称': name };
    if (priority) payload['优先级'] = priority;
    if (deadline) payload['截止时间'] = deadline + ' 00:00:00';
    if (link !== undefined) payload['链接'] = link;
    if (note !== undefined) payload['备注'] = note;
    const data = await invoke('update_task', { payload });
    if (data.code === 0) {
      showToast('已更新');
      await loadTasks();
    } else {
      showToast(data.msg || '更新失败');
    }
  } catch (error) {
    showToast('更新失败');
  } finally {
    hideLoading();
  }
}

async function toggleTaskStatus(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const newStatus = task.status === '已完成' ? '待办' : '已完成';
  const completedAt = newStatus === '已完成' ? formatDateTimeLocal(new Date()) : null;
  showLoading();
  try {
    const payload = { 'id': id, '状态': newStatus };
    if (completedAt) payload['完成时间'] = completedAt;
    else payload['完成时间'] = null;
    const data = await invoke('update_task', { payload });
    if (data.code === 0) {
      showToast(newStatus === '已完成' ? '已批' : '已恢复');
      await loadTasks();
    } else {
      showToast(data.msg || '更新失败');
    }
  } catch (error) {
    showToast('更新失败');
  } finally {
    hideLoading();
  }
}

async function deleteTask(id) {
  showLoading();
  try {
    const data = await invoke('delete_task', { id });
    if (data.code === 0) {
      showToast('已删除');
      await loadTasks();
    } else {
      showToast(data.msg || '删除失败');
    }
  } catch (error) {
    showToast('删除失败');
  } finally {
    hideLoading();
  }
}

function isToday(dateStr) {
  if (!dateStr) return false;
  const date = new Date(dateStr);
  const today = new Date();
  return date.toDateString() === today.toDateString();
}

function isFuture(dateStr) {
  if (!dateStr) return false;
  const date = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  date.setHours(0, 0, 0, 0);
  return date > today;
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  const date = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  date.setHours(0, 0, 0, 0);
  return date < today;
}

function sortByPriority(a, b) {
  const priorityOrder = { '高': 0, '中': 1, '低': 2 };
  const aPriority = priorityOrder[(a.priority || '').trim()] ?? 2;
  const bPriority = priorityOrder[(b.priority || '').trim()] ?? 2;
  if (aPriority !== bPriority) return aPriority - bPriority;
  if (a.deadline && b.deadline) return new Date(a.deadline) - new Date(b.deadline);
  return 0;
}

function getTaskTag(task) {
  if (task.status === '已完成') return { label: '已批', class: 'tag-done' };
  if (!task.deadline) return { label: '随时', class: 'tag-anytime' };
  if (isToday(task.deadline)) return { label: '今日', class: 'tag-today' };
  if (isOverdue(task.deadline)) return { label: '逾期', class: 'tag-overdue' };
  return { label: '计划', class: 'tag-planned' };
}

function getPriorityClass(priority) {
  switch (priority) {
    case '高': return 'priority-high';
    case '中': return 'priority-medium';
    case '低': return 'priority-low';
    default: return 'priority-medium';
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  if (date.toDateString() === today.toDateString()) return '';
  if (date.toDateString() === tomorrow.toDateString()) return '明日';
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function formatDateTimeLocal(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function formatDateInput(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function getFilterValue(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function hasActiveFilters() {
  return !!(getFilterValue('searchKeyword') || getFilterValue('searchPriority') ||
    getFilterValue('searchCreatedFrom') || getFilterValue('searchCreatedTo') ||
    getFilterValue('searchCompletedFrom') || getFilterValue('searchCompletedTo'));
}

function filterTasks(list) {
  if (!hasActiveFilters()) return list;
  const keyword = getFilterValue('searchKeyword').toLowerCase();
  const priority = getFilterValue('searchPriority');
  const createdFrom = getFilterValue('searchCreatedFrom');
  const createdTo = getFilterValue('searchCreatedTo');
  const completedFrom = getFilterValue('searchCompletedFrom');
  const completedTo = getFilterValue('searchCompletedTo');
  return list.filter(task => {
    if (keyword) {
      const text = `${task.name} ${task.note || ''} ${task.link || ''}`.toLowerCase();
      if (!text.includes(keyword)) return false;
    }
    if (priority && task.priority !== priority) return false;
    if (createdFrom || createdTo) {
      if (!task.created_at) return false;
      const d = formatDateInput(new Date(task.created_at));
      if (createdFrom && d < createdFrom) return false;
      if (createdTo && d > createdTo) return false;
    }
    if (completedFrom || completedTo) {
      if (!task.completed_at) return false;
      const d = formatDateInput(new Date(task.completed_at));
      if (completedFrom && d < completedFrom) return false;
      if (completedTo && d > completedTo) return false;
    }
    return true;
  });
}

function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('searchPanel').classList.toggle('show', searchVisible);
  document.getElementById('searchBtn').classList.toggle('active', searchVisible);
}

function applyFilters() { renderTasks(); }

function clearFilters() {

  document.getElementById('searchPriority').value = '';
  document.getElementById('searchCreatedFrom').value = '';
  document.getElementById('searchCreatedTo').value = '';
  document.getElementById('searchCompletedFrom').value = '';

        <textarea class="edit-input" id="addInput" rows="2" placeholder="要做什么..."></textarea>
        <div class="edit-actions">
          <select class="edit-input" id="addPriority" style="width: auto; min-height: auto; padding: 4px 8px; font-size: 13px; border-color: var(--border);">

            <option value="中" selected>中</option>

function renderTask(task) {
  const isDone = task.status === '已完成';
  const tag = getTaskTag(task);
  const dateLabel = task.deadline ? formatDate(task.deadline) : '';
  if (editingTaskId === task.id) {
    return `
      <div class="task-item">
        <div class="checkbox ${isDone ? 'checked' : ''}"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="task-content">
          <textarea class="edit-input" id="editInput-${task.id}" rows="2">${escapeHtml(task.name)}</textarea>
          <div class="edit-actions">
            <select class="edit-input" id="editPriority-${task.id}" style="width: auto; min-height: auto; padding: 4px 8px; font-size: 13px; border-color: var(--border);">
              <option value="高" ${task.priority === '高' ? 'selected' : ''}>高</option>
              <option value="中" ${task.priority === '中' ? 'selected' : ''}>中</option>
              <option value="低" ${task.priority === '低' ? 'selected' : ''}>低</option>
            </select>
            <input type="date" class="edit-input" id="editDeadline-${task.id}" value="${task.deadline ? task.deadline.split(' ')[0] : ''}" style="width: auto; min-height: auto; padding: 4px 8px; font-size: 13px; border-color: var(--border);" />
          </div>
          <div class="edit-actions">
            <input type="text" class="edit-input" id="editLink-${task.id}" value="${escapeHtml(task.link || '')}" placeholder="链接 URL" style="flex: 1; min-height: auto; padding: 4px 8px; font-size: 13px; border-color: var(--border);" />
          </div>
          <div class="edit-actions">
            <textarea class="edit-input" id="editNote-${task.id}" rows="2" placeholder="备注..." style="flex: 1; min-height: auto; padding: 4px 8px; font-size: 13px; border-color: var(--border); resize: vertical;">${escapeHtml(task.note || '')}</textarea>
          </div>
          <div class="edit-actions">
            <button class="save-btn" data-action="saveEdit" data-task-id="${task.id}">保存</button>
            <button data-action="cancelEdit">取消</button>
          </div>
        </div>
      </div>
    `;
  }
  return `
    <div class="task-item ${isDone ? 'completed' : ''}" data-task-id="${task.id}">
      <div class="checkbox ${isDone ? 'checked' : ''}" data-action="toggle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="task-content">
        <div class="task-title">${escapeHtml(task.name)}</div>
        <div class="task-meta">
          ${task.priority ? `<span class="task-tag ${getPriorityClass(task.priority)}">${task.priority}</span>` : ''}
          ${tag ? `<span class="task-tag ${tag.class}">${tag.label}</span>` : ''}
          ${dateLabel ? `<span class="task-date">${dateLabel}</span>` : ''}
        </div>
        ${task.note ? `<div class="task-note">${escapeHtml(task.note)}</div>` : ''}
        ${task.link ? `<a class="task-link" href="#" data-url="${escapeHtml(normalizeUrl(task.link))}">${escapeHtml(task.link)}</a>` : ''}
      </div>
      <div class="task-actions">
        <button class="edit-btn" data-action="edit" title="编辑">改</button>
        <button class="edit-btn delete-btn" data-action="delete" title="删除">删</button>
      </div>
    </div>
  `;
}

function renderTasks() {
  const isTaskDone = (t) => t.status === '已完成';
  const allRaw = tasks.filter(t => !isTaskDone(t)).sort(sortByPriority);
  const todayRaw = tasks.filter(t => !isTaskDone(t) && isToday(t.deadline)).sort(sortByPriority);
  const scheduledRaw = tasks.filter(t => !isTaskDone(t) && t.deadline && !isToday(t.deadline)).sort(sortByPriority);
  const anytimeRaw = tasks.filter(t => !isTaskDone(t) && !t.deadline).sort(sortByPriority);
  const completedRaw = tasks.filter(t => isTaskDone(t)).sort(sortByPriority);
  const all = filterTasks(allRaw);
  const today = filterTasks(todayRaw);
  const scheduled = filterTasks(scheduledRaw);
  const anytime = filterTasks(anytimeRaw);
  const completed = filterTasks(completedRaw);

  const renderList = (list, elId, tabName) => {
    const el = document.getElementById(elId);
    if (!el) return;
    const addHtml = (isAdding && tabName === currentTab) ? renderAddTask() : '';
    if (list.length === 0 && !isAdding) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-title">无任务</div>
          <div class="empty-desc">${hasActiveFilters() ? '没有符合筛选条件的任务' : '说 "TODOList xxx" 来添加'}</div>
        </div>
      `;
    } else {
      el.innerHTML = addHtml + list.map(renderTask).join('');
    }
  };

  renderList(all, 'allList', 'all');
  renderList(today, 'todayList', 'today');
  renderList(scheduled, 'scheduledList', 'scheduled');
  renderList(anytime, 'anytimeList', 'anytime');
  renderList(completed, 'completedList', 'completed');

  document.getElementById('allBadge').textContent = allRaw.length;
  document.getElementById('todayBadge').textContent = todayRaw.length;
  document.getElementById('scheduledBadge').textContent = scheduledRaw.length;
  document.getElementById('anytimeBadge').textContent = anytimeRaw.length;
  document.getElementById('completedBadge').textContent = completedRaw.length;

  bindDynamicEvents();
}

function bindDynamicEvents() {
  const addInput = document.getElementById('addInput');
  if (addInput) {
    addInput.addEventListener('keydown', handleAddKey);
  }

  const saveAddBtn = document.querySelector('[data-action="saveAdd"]');
  if (saveAddBtn) {
    saveAddBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      saveAdd();
    });
  }

  const cancelAddBtn = document.querySelector('[data-action="cancelAdd"]');
  if (cancelAddBtn) {
    cancelAddBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      cancelAdd();
    });
  }

  const saveEditBtn = document.querySelector('[data-action="saveEdit"]');
  if (saveEditBtn) {
    const id = saveEditBtn.getAttribute('data-task-id');
    saveEditBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (id) saveEdit(id);
    });
  }

  const cancelEditBtn = document.querySelector('[data-action="cancelEdit"]');
  if (cancelEditBtn) {
    cancelEditBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      cancelEdit();
    });
  }

  if (editingTaskId) {
    const editInput = document.getElementById(`editInput-${editingTaskId}`);
    if (editInput) {
      editInput.addEventListener('keydown', (e) => handleEditKey(e, editingTaskId));
    }
  }
}

function startAdd() {
  isAdding = true;
  renderTasks();
  const input = document.getElementById('addInput');
  if (input) input.focus();
}

function saveAdd() {
  const panel = document.getElementById(`panel-${currentTab}`);
  const input = panel ? panel.querySelector('#addInput') : null;
  const prioritySelect = panel ? panel.querySelector('#addPriority') : null;
  const deadlineInput = panel ? panel.querySelector('#addDeadline') : null;
  const name = input ? input.value.trim() : '';
  const priority = prioritySelect ? prioritySelect.value : '中';
  const deadline = deadlineInput ? deadlineInput.value : null;
  if (name) {
    addTask(name, priority, deadline);
  }
}

function cancelAdd() {
  isAdding = false;
  renderTasks();
}

function handleAddKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    saveAdd();
  } else if (event.key === 'Escape') {
    cancelAdd();
  }
}

function startEdit(id) {
  editingTaskId = id;
  renderTasks();
  const input = document.getElementById(`editInput-${id}`);
  if (input) { input.focus(); input.select(); }
}

function saveEdit(id) {
  const input = document.getElementById(`editInput-${id}`);
  const prioritySelect = document.getElementById(`editPriority-${id}`);
  const deadlineInput = document.getElementById(`editDeadline-${id}`);
  const linkInput = document.getElementById(`editLink-${id}`);
  const noteInput = document.getElementById(`editNote-${id}`);
  const newName = input ? input.value.trim() : '';
  const newPriority = prioritySelect ? prioritySelect.value : '中';
  const newDeadline = deadlineInput ? deadlineInput.value : null;
  const newLink = linkInput ? linkInput.value.trim() : '';
  const newNote = noteInput ? noteInput.value.trim() : '';
  if (newName) {
    updateTask(id, newName, newPriority, newDeadline, newLink, newNote);
  }
  editingTaskId = null;
  renderTasks();
}

function cancelEdit() {
  editingTaskId = null;
  renderTasks();
}

function handleEditKey(event, id) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    saveEdit(id);
  } else if (event.key === 'Escape') {
    cancelEdit();
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  const tabEl = document.querySelector(`.tab[data-tab="${tab}"]`);
  const panelEl = document.getElementById(`panel-${tab}`);
  if (tabEl) tabEl.classList.add('active');
  if (panelEl) panelEl.classList.add('active');
  renderTasks();
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function normalizeUrl(url) {
  if (!url) return '';
  if (!/^https?:\/\//i.test(url)) return 'https://' + url;
  return url;
}

let loadingMinTimer = null;
let loadingStartTime = 0;
const MIN_LOADING_DURATION = 300;

function showLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) {
    clearTimeout(loadingMinTimer);
    loadingStartTime = Date.now();
    el.classList.add('show');
  }
}

function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (!el) return;
  const elapsed = Date.now() - loadingStartTime;
  const remaining = MIN_LOADING_DURATION - elapsed;
  if (remaining > 0) {
    clearTimeout(loadingMinTimer);
    loadingMinTimer = setTimeout(() => {
      el.classList.remove('show');
    }, remaining);
  } else {
    el.classList.remove('show');
  }
}

function showToast(message) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = message;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function toggleAlwaysOnTop() {
  isAlwaysOnTop = !isAlwaysOnTop;
  try {
    await invoke('set_always_on_top', { value: isAlwaysOnTop });
    const btn = document.getElementById('pinBtn');
    if (btn) btn.classList.toggle('active', isAlwaysOnTop);
  } catch (error) {
    console.error('Always on top error:', error);
  }
}

let savedScrollTop = 0;

async function toggleCollapse() {
  isCollapsed = !isCollapsed;
  const win = document.getElementById('window');
  if (win) win.classList.toggle('collapsed', isCollapsed);
  try {
    await invoke('toggle_collapse', { collapsed: isCollapsed });
  } catch (error) {
    console.error('Collapse error:', error);
  }

  if (!isCollapsed) {
    const content = document.querySelector('.content');
    if (content) {
      requestAnimationFrame(() => {
        content.scrollTop = savedScrollTop;
      });
    }
  } else {
    const content = document.querySelector('.content');
    if (content) savedScrollTop = content.scrollTop;
  }
}

async function minimizeWindow() {
  try {
    await invoke('minimize_window');
  } catch (error) {
    console.error('Minimize error:', error);
  }
}

async function closeWindow() {
  try {
    await invoke('close_window');
  } catch (error) {
    console.error('Close error:', error);
  }
}

document.addEventListener('click', (e) => {
  const link = e.target.closest('.task-link');
  if (link) {
    e.preventDefault();
    const url = link.getAttribute('data-url');
    if (url) invoke('open_external', { url }).catch(() => {});
    return;
  }

  const taskItem = e.target.closest('.task-item');
  if (taskItem) {
    const taskId = taskItem.getAttribute('data-task-id');
    const actionEl = e.target.closest('[data-action]');
    if (actionEl) {
      const action = actionEl.getAttribute('data-action');
      e.stopPropagation();
      if (action === 'toggle' && taskId) {
        toggleTaskStatus(taskId);
      } else if (action === 'edit' && taskId) {
        startEdit(taskId);
      } else if (action === 'delete' && taskId) {
        deleteTask(taskId);
      } else if (action === 'saveAdd') {
        saveAdd();
      } else if (action === 'cancelAdd') {
        cancelAdd();
      } else if (action === 'saveEdit') {
        const id = actionEl.getAttribute('data-task-id');
        if (id) saveEdit(id);
      } else if (action === 'cancelEdit') {
        cancelEdit();
      }
      return;
    }
  }
});

window.addEventListener('DOMContentLoaded', () => {
  console.log('DOMContentLoaded');
  initVoice();
  renderTasks();
  loadTasks();

  const dragRegion = document.getElementById('dragRegion');
  if (dragRegion) {
    dragRegion.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        e.preventDefault();
        invoke('start_dragging').catch(() => {});
      }
    });
  }

  const addListener = (id, handler) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', handler);
  };

  const addInputListener = (id, event, handler) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener(event, handler);
  };

  addListener('btnAdd', startAdd);
  addListener('btnRefresh', loadTasks);
  addListener('searchBtn', toggleSearch);
  addListener('pinBtn', toggleAlwaysOnTop);
  addListener('btnCollapse', toggleCollapse);
  addListener('btnMinimize', minimizeWindow);
  addListener('btnClose', closeWindow);

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const tabName = tab.getAttribute('data-tab');
      if (tabName) switchTab(tabName);
    });
  });

  addInputListener('searchKeyword', 'input', applyFilters);
  addInputListener('searchPriority', 'change', applyFilters);
  addInputListener('searchCreatedFrom', 'change', applyFilters);
  addInputListener('searchCreatedTo', 'change', applyFilters);
  addInputListener('searchCompletedFrom', 'change', applyFilters);
  addInputListener('searchCompletedTo', 'change', applyFilters);
  addListener('searchClear', clearFilters);
});

</script>
</body>
